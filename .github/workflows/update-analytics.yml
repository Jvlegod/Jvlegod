name: Update profile analytics

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git rebase origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate analytics SVGs
        run: python scripts/update_analytics.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITHUB_USERNAME: Jvlegod
          GITEE_USERNAME: Jvle
          ENABLE_GITEE: "1"
          DEEP_COMMIT_SCAN: "1"
          STAR_YEAR_SCAN: "1"

      - name: Upload profile images
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PROFILE_PATH: ${{ secrets.SERVER_PROFILE_PATH }}
        run: |
          if [[ "$SERVER_PROFILE_PATH" != /* ]]; then
            echo "SERVER_PROFILE_PATH must be an absolute server path"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$SERVER_PROFILE_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22}" \
            assets/ "$SERVER_USER@$SERVER_HOST:$SERVER_PROFILE_PATH/"

      - name: Refresh README image cache
        run: |
          export version="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          perl -0pi -e 's#language-overview\.svg(?:\?v=[^"]+)?#"language-overview.svg?v=$ENV{version}"#ge; s#status-summary\.svg(?:\?v=[^"]+)?#"status-summary.svg?v=$ENV{version}"#ge' README.md

      - name: Commit README cache refresh
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh analytics image cache"
          file_pattern: README.md
