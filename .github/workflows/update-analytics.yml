name: Update profile analytics

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git rebase origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate analytics SVGs
        run: python scripts/update_analytics.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITHUB_USERNAME: Jvlegod
          GITEE_USERNAME: Jvle
          ENABLE_GITEE: "0"
          DEEP_COMMIT_SCAN: "1"
          STAR_YEAR_SCAN: "1"

      - name: Commit updated analytics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update profile analytics
          file_pattern: assets/analytics/*.svg
